// ─── Shared Components ───────────────────────────────────────────────

function MapBtn({ href, label = "📍 Open in Maps", color = C.terra }) {
  return (
    <a
      href={href}
      target="_blank"
      rel="noopener noreferrer"
      style={{
        display: "inline-block",
        background: color,
        color: "#fff",
        padding: "9px 18px",
        borderRadius: "8px",
        textDecoration: "none",
        fontWeight: "500",
        fontSize: "13px",
        letterSpacing: "0.2px",
        whiteSpace: "nowrap",
      }}
    >
      {label}
    </a>
  );
}

function InfoCard({ children, accent, style = {} }) {
  return (
    <div
      style={{
        background: C.card,
        border: `1px solid ${C.border}`,
        borderLeft: accent ? `4px solid ${accent}` : `1px solid ${C.border}`,
        borderRadius: accent ? "0 12px 12px 0" : "12px",
        padding: "18px 20px",
        marginBottom: "14px",
        ...style,
      }}
    >
      {children}
    </div>
  );
}

function SecTitle({ children }) {
  return (
    <div style={{ marginBottom: "22px" }}>
      <h2
        style={{
          fontFamily: "'Playfair Display', Georgia, serif",
          fontSize: "24px",
          fontWeight: "700",
          color: C.dark,
          margin: "0 0 6px",
          lineHeight: 1.2,
        }}
      >
        {children}
      </h2>
      <div style={{ width: "48px", height: "3px", background: C.gold, borderRadius: "2px" }} />
    </div>
  );
}

    { icon: "💧", text: "Bring a water bottle everywhere. Desert rules apply." },
    { icon: "🧴", text: "SPF 50+ is non-negotiable — the sun is intense" },
    { icon: "🌙", text: "Evenings cool to 55–65°F — perfect patio weather" },

    { icon: "🗺️", text: "Tucson is spread out. Attractions can be 20–35 minutes apart — plan ahead and group things by area." },

  return (

      <InfoCard accent={C.terra}>
        <p style={{ fontSize: "15px", lineHeight: "1.8", color: C.dark, margin: "0 0 12px" }}>

        </p>
        <p style={{ fontSize: "15px", lineHeight: "1.8", color: C.dark, margin: 0 }}>
          April is one of the best months to be here: warm and sunny without being punishingly hot, wildflowers still blooming, and everything outdoors is calling your name. Hopefully this guide has everything you need to enjoy your stay. Welcome to the Sonoran Desert.
        </p>
      </InfoCard>

      <h3
        style={{
          fontFamily: "'Playfair Display', serif",

          <div

        <p style={{ fontSize: "13px", color: C.mid, margin: 0, lineHeight: "1.6" }}>
          <strong style={{ color: C.dark }}>Suggested day combos:</strong> West Side Day — Desert Museum + Old Tucson + Saguaro West. East Side Day — Colossal Cave + Saguaro East + Pima Air Museum. Downtown Day — El Charro lunch + Children's Museum + Mi Nidito dinner.
        </p>
      </InfoCard>
    </div>
  );
}

function EatPanel({ eatSub, setEatSub }) {
  const items = restaurants[eatSub] || [];
  return (
    <div>
      <SecTitle>Where to Eat 🌮</SecTitle>
      <p style={{ fontSize: "14px", color: C.muted, marginBottom: "20px", lineHeight: "1.6" }}>

      </p>
      <div style={{ display: "flex", gap: "8px", marginBottom: "24px", flexWrap: "wrap" }}>
        {EAT_TABS.map((t) => (
          <button
            key={t.id}
            onClick={() => setEatSub(t.id)}
            style={{
              padding: "8px 18px",
              borderRadius: "20px",
              border: `2px solid ${eatSub === t.id ? C.terra : C.border}`,
              background: eatSub === t.id ? C.terra : "transparent",
              color: eatSub === t.id ? "#fff" : C.dark,
              fontWeight: "500",
              fontSize: "13px",
              cursor: "pointer",
              fontFamily: "inherit",
              transition: "all 0.15s",
            }}
          >
            {t.label}
          </button>
        ))}
      </div>

      {items.map((r, i) => (
        <div
          key={i}
          style={{
            background: C.card,
            border: `1px solid ${C.border}`,
            borderRadius: "14px",
            padding: "18px 20px",
            marginBottom: "14px",
          }}

          <div style={{ display: "flex", gap: "14px" }}>

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "8px", marginBottom: "3px" }}>
                <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "17px", fontWeight: "700", color: C.dark }}>{r.name}</div>
                <span style={{ fontSize: "11px", background: C.terra + "18", color: C.terra, padding: "3px 10px", borderRadius: "12px", fontWeight: "500", whiteSpace: "nowrap" }}>
                  {r.sub}
                </span>
              </div>
              <div style={{ fontSize: "12px", color: C.muted, marginBottom: "8px" }}>📍 {r.addr}</div>
              <p style={{ fontSize: "13px", color: C.dark, lineHeight: "1.65", marginBottom: "10px" }}>{r.desc}</p>

                  <span style={{ fontSize: "12px", color: C.mid }}>{r.must}</span>
